name: Deploy Marketing Planner to Azure Static Web Apps

# ─────────────────────────────────────────────────────────────────────────────
# Triggers: every push to main, plus manual via "Run workflow" button.
# Pull requests also build (without deploying) so we can preview changes
# before merging.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:   # manual trigger

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build + Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install API dependencies
        run: |
          cd api
          npm ci
        # The Static Web App build step will also do this, but doing it here
        # surfaces dependency errors immediately + gives us a chance to run
        # tests / linting in future.

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          # File-layout — see staticwebapp.config.json for routing rules.
          app_location: '/'           # HTML lives at repo root
          api_location: 'api'         # Functions in /api folder
          output_location: ''         # Static — no build output to upload

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close PR
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
