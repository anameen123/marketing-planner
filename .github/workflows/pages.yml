name: Deploy to GitHub Pages

# ─────────────────────────────────────────────────────────────────────────────
# Pushes to main → live site within ~30 seconds.
#
# What this does:
#   1. Checks out the repo
#   2. Copies marketing_schedule_FINAL4.html → index.html in a deploy folder
#      so the GitHub Pages URL is clean (e.g. iccoftexas.github.io/marketing
#      instead of .../marketing/marketing_schedule_FINAL4.html)
#   3. Uploads the deploy folder + publishes
#
# Files included in the deploy:
#   - index.html  (copy of marketing_schedule_FINAL4.html)
#   - logo.jpeg
#   - staticwebapp.config.json (Entra ID + routing rules — ignored by Pages but
#     kept for parity with the Azure SWA back-pocket option)
#
# Files EXCLUDED from deploy:
#   - Anything in api/, infra/, scripts/, flows/  (server-side / dev-only)
#   - All *.backup-*.html safety backups
#   - All node_modules
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:   # let admin trigger a re-deploy manually from the Actions tab

# Pages deployments need write permission on pages + id-token for the OIDC
# token that the deploy step exchanges for upload credentials.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time — newer pushes cancel older in-flight
# deploys so we don't ship stale code on top of a newer commit.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble deploy folder
        run: |
          mkdir -p _site
          cp marketing_schedule_FINAL4.html _site/index.html
          # Keep the original filename around too so existing bookmarks still resolve
          cp marketing_schedule_FINAL4.html _site/marketing_schedule_FINAL4.html
          cp logo.jpeg                       _site/logo.jpeg
          # Tell GitHub Pages NOT to run Jekyll (our HTML uses _underscored
          # variables Jekyll would try to interpret).
          touch _site/.nojekyll
          ls -la _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
